name: Currency System CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  server-build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            make \
            zip \
            unzip \
            curl \
            libcurl4-openssl-dev \
            pkg-config

      - name: Configure project
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON -DBUILD_CLIENT=OFF

      - name: Build project
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: build
        timeout-minutes: 10
        run: ctest --output-on-failure --verbose --timeout 120

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs
          path: |
            build/Testing
            build/**/*.log
          if-no-files-found: ignore

  client-build-and-test:
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.7.2
          arch: win64_mingw
          modules: qtcharts
          setup-python: false
          tools: "tools_mingw90,qt.tools.win64_mingw900"

      - name: Install Ninja (Chocolatey)
        shell: pwsh
        run: |
          choco install ninja -y --no-progress
          ninja --version
          if (-not (Get-Command g++.exe -ErrorAction SilentlyContinue)) {
            Write-Error "g++.exe not found on PATH after Qt install."
            exit 1
          }
          g++.exe --version

      - name: Configure project
        shell: pwsh
        env:
          CC: gcc
          CXX: g++
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON -DBUILD_CLIENT=ON

      - name: Build client tests
        shell: pwsh
        env:
          CC: gcc
          CXX: g++
        run: cmake --build build --target currency_client_tests --parallel

      - name: Run client tests
        shell: pwsh
        timeout-minutes: 10
        env:
          CC: gcc
          CXX: g++
        run: ctest --test-dir build --output-on-failure --verbose --timeout 120

      - name: Upload client test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: client-ctest-logs
          path: |
            build/Testing
            build/**/*.log
          if-no-files-found: ignore
