name: Currency System CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  server-build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            make \
            zip \
            unzip \
            curl \
            pkg-config

      - name: Configure project
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON -DBUILD_CLIENT=OFF

      - name: Build project
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: build
        timeout-minutes: 10
        run: ctest --output-on-failure --verbose --timeout 120

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs
          path: |
            build/Testing
            build/**/*.log
          if-no-files-found: ignore

  client-build-and-test:
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.7.2
          arch: win64_mingw
          modules: qtcharts

      - name: Install MinGW and Ninja (Chocolatey)
        shell: pwsh
        run: |
          choco install mingw -y --no-progress --version=13.1.0
          choco install ninja -y --no-progress
          $mingwBin = "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin"
          if (-not (Test-Path $mingwBin)) {
            Write-Error "MinGW bin not found at $mingwBin"
            exit 1
          }
          Add-Content $env:GITHUB_PATH $mingwBin
          & "$mingwBin\g++.exe" --version
          ninja --version

      - name: Configure project
        shell: pwsh
        env:
          CC: gcc
          CXX: g++
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON -DBUILD_CLIENT=ON

      - name: Build client tests
        shell: pwsh
        env:
          CC: gcc
          CXX: g++
        run: cmake --build build --target currency_client_tests --parallel

      - name: Run client tests
        shell: pwsh
        timeout-minutes: 10
        env:
          CC: gcc
          CXX: g++
        run: ctest --test-dir build --output-on-failure --verbose --timeout 120

      - name: Upload client test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: client-ctest-logs
          path: |
            build/Testing
            build/**/*.log
          if-no-files-found: ignore